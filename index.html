<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cave Simulator 3D</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- MENU INICIAL -->
    <div id="main-menu">
      <div class="menu-box">
        <h1>Cave Simulator</h1>
        <p class="subtitle">Em busca do Ouro Perdido</p>

        <div class="setting-group">
          <label for="batProb">
            <span>Morcegos no Teto</span>
            <span id="batVal">30%</span>
          </label>
          <input
            type="range"
            id="batProb"
            min="0"
            max="1"
            step="0.05"
            value="0.3"
          />
        </div>

        <div class="setting-group">
          <label for="skullProb">
            <span>Crânios no Chão</span>
            <span id="skullVal">80%</span>
          </label>
          <input
            type="range"
            id="skullProb"
            min="0"
            max="1"
            step="0.05"
            value="0.8"
          />
        </div>

        <button id="start-btn" class="start-btn">Entrar na Caverna</button>
      </div>
    </div>

    <!-- TELA DE LOADING -->
    <div id="loading-screen">
      <h2>DESCENDO ÀS PROFUNDEZAS...</h2>
    </div>

    <!-- HUD E OVERLAYS (IN GAME) -->
    <div id="crosshair">+</div>
    <div id="game-tips">
      Use W, A, S, D para andar. O mouse direciona a lanterna.
    </div>

    <div id="debug-hud">
      [DEBUG MODE]<br />
      FPS: <span id="fps">0</span> | DrawCalls: <span id="drawCalls">0</span
      ><br />
      Verts: <span id="vertices">0</span><br />
      Pos: <span id="camPos">[0,0,0]</span><br />
      Rot: <span id="camRot">[0,0]</span>
    </div>

    <!-- O CANVAS 3D -->
    <canvas id="gameCanvas"></canvas>

    <!-- OS SCRIPTS -->
    <script type="module" src="src/main.js"></script>

    <script>
      // Atualiza os valores do slider em tempo real no HTML
      document.getElementById("batProb").addEventListener("input", (e) => {
        document.getElementById("batVal").innerText =
          Math.round(e.target.value * 100) + "%";
      });
      document.getElementById("skullProb").addEventListener("input", (e) => {
        document.getElementById("skullVal").innerText =
          Math.round(e.target.value * 100) + "%";
      });
    </script>
  </body>
</html>
